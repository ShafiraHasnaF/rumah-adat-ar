<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR | Rumah Adat Indonesia</title>

    <!-- assets -->
    <link href="./src/output.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body class="bg-[#4E2012]">
    <!-- splashscreen -->
    <div id="splash-screen"
        class="fixed inset-0 flex flex-col items-center justify-center opacity-100 transition-opacity duration-500 gap-2">
        <p class="items-center text-center text-white text-2xl font-dancing">
            Anjungan Virtual
        </p>
        <h1 class="items-center text-center text-white text-5xl font-dancing">
            Rumah Adat Indonesia
        </h1>
    </div>

    <!-- guidepage -->
    <section id="guidepage"
        class="opacity-0 overflow-hidden min-h-screen flex flex-col items-center justify-center px-8 transition-opacity duration-500">
        <img src="/assets/img/indonesia.png" alt="Indonesia"
            class="absolute inset-0 w-full md:inset-0 md:w-full md:top-10 md:object-contain items-center object-cover opacity-20 md:opacity-15 -z-10 top-6">
        <div class="flex flex-col items-center md:gap-10">
            <p class="text-center text-white text-2xl md:text-4xl font-dm-serif max-w-lg md:max-w-2xl">
                Rumah adat <span class="text-[#FFD188]">bukan sekadar bangunan</span>, tapi penuh <span class="text-[#FFD188]">makna budaya</span>.
            </p>
            <div onclick="window.location.href='/section/homepage.html'"
                class="outline-2 outline-white rounded-full text-white font-dm-serif py-3 px-10 md:px-18 text-center absolute bottom-10 md:relative md:bottom-0 hover:bg-white hover:text-[#4E2012] transition-all duration-200 cursor-pointer">
                <i class="fas fa-arrow-right mr-3"></i>
                Telusuri Sekarang
            </div>
        </div>
    </section>

    <script src="assets/script.js"></script>
</body>
</html>
